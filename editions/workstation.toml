#
# Target: Developer desktop, full-featured OS for development and testing
# Footprint: ~8 MB
# ===========================================================================

[edition]
name = "Workstation"
codename = "spiral"
version = "0.1.0"
license = "proprietary"         # Full version — proprietary master
target_size_kb = 8192

[arch]
primary = "x86_64"
alternatives = []

[kernel]
scheduler = "priority-preemptive"
max_processes = 256
max_threads = 1024
tick_rate_hz = 1000
realtime = false
watchdog = false

[memory]
heap_size_kb = 16384            # 16 MB heap
stack_size_kb = 32
page_size = 4096
no_swap = false

[features]
# Core — everything enabled
init = true
scheduler = true
memory_manager = true
ipc = true
syscalls = true

# All drivers
serial = true
timer = true
vga = true
keyboard = true
pci = true
network = true
disk = true
gpio = false                    # Not applicable on x86_64 workstation
spi = false
i2c = false

# All filesystems
ltlfs = true
fat32 = true

# Full shell
shell = true
builtins = true

# All services
mesh_agent = true
crypto_service = true
monitor = true

# Workstation extras
text_editor = true              # Built-in ltled editor
package_manager = true          # ltlpkg package manager
compiler_service = true         # On-device Lateralus compiler
debugger = true                 # Built-in debugger
profiler = true                 # Performance profiler

[build]
optimization = "speed"          # -O2
strip_debug = false
lto = true
linker_script = "tools/linker-x86_64.ld"

[boot]
mode = "multiboot2"
bootloader = "grub2"
splash_screen = true

[logging]
backend = "serial+vga"
level = "debug"
buffer_size = 65536             # 64 KB log buffer

[development]
# Developer-focused features
repl = true                     # Lateralus REPL in shell
hot_reload = true               # Hot-reload .ltl programs
source_maps = true              # Source-level debugging
test_runner = true              # Built-in test framework
