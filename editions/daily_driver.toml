# LateralusOS — Daily Driver Edition
# Target: x86_64 / Raspberry Pi 5 daily use workstation
# Copyright (c) 2025 bad-antics. All rights reserved.

[edition]
name    = "daily_driver"
version = "1.0.0"
target  = ["x86_64", "aarch64-rpi5"]
description = "Fully-featured daily driving edition of LateralusOS"

[kernel]
scheduler   = "preemptive-round-robin"
preempt     = true
smp         = true
max_cpus    = 16
hz          = 1000
hpet        = true
tickless    = true

[memory]
min_ram_mb  = 512
target_ram  = "4GB"
huge_pages  = true
swap        = false   # in-memory OS, no disk swap needed
kmalloc_heap_mb = 256

[hardware]
mouse     = true
keyboard  = true
sound     = true
gpu       = true
nvme      = true
wifi      = true
usb       = true
rtc       = true
pci       = true
bluetooth = true

[display]
width         = 1920
height        = 1080
depth         = 32
fps_target    = 60
vsync         = true
compositor    = "software"

[gui]
window_manager  = "floating-tiling"
taskbar         = true
taskbar_height  = 40
taskbar_pos     = "bottom"
desktop         = true
icons           = true
notifications   = true
default_theme   = "catppuccin-mocha"
font_size       = 14
cursor_size     = 24
animations      = true
transparency    = true

[accessibility]
dyslexia_font   = false
high_contrast   = false
large_cursor    = false
screen_reader   = false
sticky_keys     = false

[filesystems]
root      = "ltlfs"
home      = "ext4"
tmp       = "tmpfs"
proc      = "procfs"
dev       = "devfs"
var       = "ext4"

[services]
init          = true
display       = true
audio         = true
network_manager = true
power         = true
user_manager  = true
syslog        = true
pkg_manager   = true
cron          = true
dbus          = false

[network]
dhcp          = true
dns_fallback  = ["8.8.8.8", "1.1.1.1"]
ipv6          = true
wifi          = true
ethernet      = true

[apps]
# Default apps launched at startup
autostart = ["display_server"]

# Default app associations
default_browser    = "browser"
default_editor     = "editor"
default_terminal   = "terminal"
default_file_mgr   = "file_manager"
default_image      = "image_viewer"
default_music      = "music"
default_video      = "video"
default_pdf        = "pdf_reader"

# Included applications
browser       = true
file_manager  = true
settings      = true
calculator    = true
calendar      = true
music         = true
video         = true
image_viewer  = true
pdf_reader    = true
screenshot    = true
editor        = true
chat          = true
terminal      = true

[shell]
name       = "ltlsh"
scripting  = true
completion = true
history    = 5000
vi_mode    = false

[security]
sudo       = true
firewall   = true
aslr       = true
nx_bit     = true

[power]
governor     = "ondemand"
suspend      = true
hibernate    = false
screen_blank = 300   # seconds

[localization]
locale    = "en_US.UTF-8"
timezone  = "UTC"
keymap    = "us"
