# Target: Laboratory instruments, data acquisition, scientific computing
# Footprint: ~2 MB
# ===========================================================================

[edition]
name = "Research"
codename = "helix"
version = "0.1.0"
license = "freeware"
target_size_kb = 2048

[arch]
primary = "x86_64"
alternatives = ["riscv64"]

[kernel]
scheduler = "priority-preemptive"
max_processes = 64
max_threads = 256
tick_rate_hz = 1000
realtime = false
watchdog = false

[memory]
heap_size_kb = 4096         # 4 MB heap for data processing
stack_size_kb = 16
page_size = 4096
no_swap = false

[features]
# Core
init = true
scheduler = true
memory_manager = true
ipc = true
syscalls = true

# Drivers
serial = true
timer = true
vga = true                  # Display for data visualization
keyboard = true             # Interactive control
pci = true                  # PCI for DAQ cards
network = true              # Ethernet for data transfer
disk = true                 # Local storage
gpio = true                 # GPIO for lab equipment
spi = true
i2c = true

# Filesystems
ltlfs = true                # Native filesystem
fat32 = true                # USB/SD card access

# Shell
shell = true                # Full interactive shell
builtins = true

# Services
mesh_agent = true           # Connect lab instruments
crypto_service = true       # Secure data handling
monitor = true              # System health

[build]
optimization = "speed"      # -O2
strip_debug = false         # Keep debug symbols
lto = true
linker_script = "tools/linker-x86_64.ld"

[boot]
mode = "multiboot2"
bootloader = "grub2"

[logging]
backend = "serial+vga"
level = "info"
buffer_size = 8192

[research]
# Research-specific features
data_acquisition = true
csv_export = true
real_time_plotting = false  # Future
instrument_drivers = true
