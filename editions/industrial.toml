#
# Target: Factory floor controllers, SCADA systems, PLC replacements
# Footprint: ~512 KB
# ===========================================================================

[edition]
name = "Industrial"
codename = "forge"
version = "0.1.0"
license = "freeware"
target_size_kb = 512

[arch]
primary = "arm-cortex-m4"
alternatives = ["x86_64", "riscv64"]

[kernel]
scheduler = "priority-preemptive"
max_processes = 16
max_threads = 32
tick_rate_hz = 10000        # High-frequency timer for real-time
realtime = true
watchdog = true
watchdog_timeout_ms = 5000

[memory]
heap_size_kb = 128
stack_size_kb = 8
page_size = 4096
no_swap = true              # Never swap in industrial

[features]
# Core
init = true
scheduler = true
memory_manager = true
ipc = true
syscalls = true

# Drivers
serial = true
timer = true
gpio = true                 # GPIO for sensor/actuator control
spi = true                  # SPI bus for peripherals
i2c = true                  # I2C bus for sensors
can_bus = true              # CAN bus for industrial networks

# Optional (disabled for size)
vga = false                 # No display
keyboard = false            # No HID input
pci = false                 # No PCI bus
network = false             # No ethernet (use CAN/serial)
fat32 = false               # No external media
shell = false               # No interactive shell

# Services
mesh_agent = false          # No mesh in standalone industrial
crypto_service = true       # Secure boot + authenticated updates
monitor = true              # Health monitoring critical

[build]
optimization = "size"       # -Os
strip_debug = true
lto = true                  # Link-time optimization
linker_script = "tools/linker-arm.ld"

[boot]
mode = "direct"             # No bootloader, direct flash boot
entry = "Reset_Handler"

[logging]
backend = "serial"
level = "warn"              # Minimal logging in production
buffer_size = 1024
