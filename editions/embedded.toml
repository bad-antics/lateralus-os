#
# Target: Sensor nodes, IoT gateways, microcontroller applications
# Footprint: ~128 KB
# ===========================================================================

[edition]
name = "Embedded"
codename = "seed"
version = "0.1.0"
license = "freeware"
target_size_kb = 128

[arch]
primary = "arm-cortex-m4"
alternatives = ["riscv64"]

[kernel]
scheduler = "cooperative"       # No preemption — simpler and smaller
max_processes = 4
max_threads = 8
tick_rate_hz = 100              # Low-frequency timer to save power
realtime = false
watchdog = true
watchdog_timeout_ms = 10000

[memory]
heap_size_kb = 16
stack_size_kb = 2
page_size = 0                   # No MMU on Cortex-M4
no_swap = true

[features]
# Core (minimal)
init = true
scheduler = true
memory_manager = false          # Static allocation only
ipc = true                      # Lightweight message passing
syscalls = false                # Direct function calls

# Drivers
serial = true
timer = true
gpio = true
spi = true
i2c = true
adc = true                     # Analog-to-digital for sensors

# Disabled
vga = false
keyboard = false
pci = false
network = false
disk = false
can_bus = false
fat32 = false
ltlfs = false
shell = false
builtins = false

# Services
mesh_agent = false
crypto_service = false          # Too large for 128 KB
monitor = true                  # Lightweight watchdog only

[build]
optimization = "size"           # -Os
strip_debug = true
lto = true
gc_sections = true              # Remove unused code sections
linker_script = "tools/linker-arm.ld"

[boot]
mode = "direct"
entry = "Reset_Handler"

[logging]
backend = "serial"
level = "error"                 # Only errors
buffer_size = 256

[power]
sleep_mode = "deep"
wake_sources = ["timer", "gpio", "uart"]
