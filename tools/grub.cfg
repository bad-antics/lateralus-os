set timeout=5
set default=0

# -- Theme ----------------------------------------------------------------

set menu_color_normal=white/black
set menu_color_highlight=black/light-cyan

# -- Main Menu ------------------------------------------------------------

menuentry "LateralusOS" {
    multiboot2 /boot/lateralus.elf
    boot
}

menuentry "LateralusOS (Serial Debug)" {
    multiboot2 /boot/lateralus.elf serial=on loglevel=debug
    boot
}

menuentry "LateralusOS (Safe Mode)" {
    multiboot2 /boot/lateralus.elf safe_mode=1 no_mesh=1 no_crypto=1
    boot
}

menuentry "LateralusOS (Industrial Edition)" {
    multiboot2 /boot/lateralus.elf edition=industrial realtime=1
    boot
}

menuentry "LateralusOS (Research Edition)" {
    multiboot2 /boot/lateralus.elf edition=research mesh=1 full_kernel=1
    boot
}

menuentry "LateralusOS (Embedded Edition)" {
    multiboot2 /boot/lateralus.elf edition=embedded minimal=1
    boot
}

menuentry "Reboot" {
    reboot
}

menuentry "Shutdown" {
    halt
}
